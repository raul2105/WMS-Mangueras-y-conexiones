name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/wms?schema=public

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: wms
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate PostgreSQL connectivity
        run: node scripts/db/assert-postgres-env.cjs --check-connection

      - name: Prisma validate
        run: npm run prisma:validate

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Run linter
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Run RBAC integration tests
        run: npm run test:rbac:integration

      - name: Run customer PostgreSQL integration tests
        run: npm run test:customers:postgres

      - name: Run sales service regression tests
        run: npm run test:sales:service

      - name: Run customer contract tests
        run: npm run test:customers:contracts

      - name: Build application
        run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

  smoke-published:
    name: Smoke Published Links
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    env:
      MOBILE_PUBLISHED_URL: https://d2cqvl04yxlts4.cloudfront.net
      MOBILE_API_BASE_URL: https://5o7r5ww532.execute-api.us-east-1.amazonaws.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run published smoke tests
        run: npm run smoke:published
