name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    name: Quality Gate (required)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: wms
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d wms"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/wms?schema=public
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: TypeScript check
        run: npm run typecheck
      
      - name: Prisma check
        run: npm run prisma:validate

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Sync test schema (PostgreSQL)
        run: npm run db:push

      - name: Run PostgreSQL regression suite
        run: npm run test:regression:postgres

      - name: Build application
        run: npm run build

  security:
    name: Security Audit (optional)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

  smoke-published:
    name: Smoke Published Links (optional, push only)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    env:
      MOBILE_PUBLISHED_URL: https://d2cqvl04yxlts4.cloudfront.net
      MOBILE_API_BASE_URL: https://5o7r5ww532.execute-api.us-east-1.amazonaws.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run published smoke tests
        run: npm run smoke:published
