name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/wms?schema=public
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: TypeScript check
        run: npx tsc --noEmit
      
      - name: Build application
        run: npm run build
      
      - name: Prisma check
        run: npm run prisma:validate

      - name: Run automated tests
        run: npm run test:rbac:unit && npm run test:customers:contracts

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

  smoke-published:
    name: Smoke Published Links
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    env:
      MOBILE_PUBLISHED_URL: https://d2cqvl04yxlts4.cloudfront.net
      MOBILE_API_BASE_URL: https://5o7r5ww532.execute-api.us-east-1.amazonaws.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run published smoke tests
        run: npm run smoke:published
