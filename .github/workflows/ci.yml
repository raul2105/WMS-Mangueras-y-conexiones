name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:


concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate (required)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: wms
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d wms"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/wms?schema=public
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: TypeScript check
        run: npm run typecheck
      
      - name: Prisma check
        run: npm run prisma:validate

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Sync test schema (PostgreSQL)
        run: npx prisma migrate deploy --schema prisma/postgresql/schema.prisma

      - name: Run PostgreSQL regression suite
        run: npm run test:regression:postgres

      - name: Build application
        run: npm run build

      - name: Build OpenNext artifact
        run: npm run build:opennext

  security:
    name: Security Audit (optional)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Audit dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

  smoke-published:
    name: Smoke Published Links (optional, push only)
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'
    env:
      MOBILE_PUBLISHED_URL: https://d2b1ltxtvypxr4.cloudfront.net
      MOBILE_API_BASE_URL: https://d2b1ltxtvypxr4.cloudfront.net

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run published smoke tests
        run: npm run smoke:published

  nightly-full-regression:
    name: Nightly Full PostgreSQL Regression (scheduled/manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: wms
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci -d wms"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/wms?schema=public

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma check
        run: npm run prisma:validate

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Sync test schema (PostgreSQL)
        run: npx prisma migrate deploy --schema prisma/postgresql/schema.prisma

      - name: Run full PostgreSQL suite
        run: npm run test:postgres

      - name: Build Next.js runtime
        run: npm run build

      - name: Build OpenNext artifact
        run: npm run build:opennext

